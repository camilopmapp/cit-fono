// android/build.gradle
buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion     = 26
        compileSdkVersion = 34
        targetSdkVersion  = 34
        ndkVersion        = "26.1.10909125"
        kotlinVersion     = "1.9.22"

        // 🚀 SOLUCIÓN DEFINITIVA: Proveer la versión y ruta manual a Reanimated
        reactNativeVersion = "0.73.6"
        reactNativeDir = "${rootProject.projectDir}/../node_modules/react-native"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
    }

    // 🛠️ Mantener el forzado de versiones de Android Core para evitar conflictos SDK 35
    configurations.all {
        resolutionStrategy {
            force 'androidx.core:core:1.13.1'
            force 'androidx.core:core-ktx:1.13.1'
        }
    }
}
