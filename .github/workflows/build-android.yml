name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          cd citofono_app
          npm install --legacy-peer-deps

      - name: Build Android Debug APK
        run: |
          cd citofono_app/android
          # Forzamos la versión 8.3 que es compatible con Android 14
          gradle wrapper --gradle-version 8.3
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: citofonia-debug-apk
          path: citofono_app/android/app/build/outputs/apk/debug/app-debug.apk
