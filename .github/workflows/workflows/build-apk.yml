name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:  # permite correrlo manualmente desde GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: citofono_app/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: citofono_app

      - name: Build APK
        run: ./gradlew assembleRelease
        working-directory: citofono_app/android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: citofonia-release
          path: citofono_app/android/app/build/outputs/apk/release/app-release.apk
